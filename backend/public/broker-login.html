<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broker Login — AgroSetu</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;background:#f0f5f0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Source Sans 3',sans-serif;
    }
    .card{
      background:#fff;border-radius:20px;
      padding:48px 44px;width:100%;max-width:420px;
      box-shadow:0 12px 40px rgba(30,61,26,0.13);
    }
    .logo{text-align:center;margin-bottom:32px;}
    .logo-icon{font-size:3rem;margin-bottom:8px;}
    .logo h1{font-size:1.5rem;font-weight:700;color:#1e3d1a;}
    .logo p{font-size:.82rem;color:#888;margin-top:4px;}
    .logo .gu{font-family:'Noto Sans Gujarati',sans-serif;font-size:1rem;color:#2d5a27;font-weight:600;}

    label{display:block;font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px;margin-top:18px;}
    input{
      width:100%;padding:11px 14px;border:1.5px solid #d0d8d0;
      border-radius:9px;font-size:.95rem;transition:border .2s;
      font-family:inherit;
    }
    input:focus{outline:none;border-color:#2d5a27;box-shadow:0 0 0 3px rgba(45,90,39,.1);}

    .btn{
      width:100%;margin-top:24px;padding:13px;
      background:#2d5a27;color:#fff;border:none;
      border-radius:10px;font-size:1rem;font-weight:700;
      cursor:pointer;transition:background .2s;
      font-family:inherit;
    }
    .btn:hover{background:#1e3d1a;}
    .btn:disabled{background:#aaa;cursor:not-allowed;}

    .error{
      background:#fdecea;color:#c0392b;
      border:1px solid #f5c6c6;border-radius:8px;
      padding:10px 14px;font-size:.84rem;
      margin-top:16px;display:none;
    }
    .error.show{display:block;}

    .hint{
      text-align:center;margin-top:20px;
      font-size:.78rem;color:#aaa;
    }
    .divider{
      border:none;border-top:1px solid #eee;margin:28px 0 0;
    }
    .admin-link{
      text-align:center;margin-top:14px;
      font-size:.78rem;color:#bbb;
    }
    .admin-link a{color:#888;text-decoration:none;}
    .admin-link a:hover{color:#2d5a27;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌾</div>
    <div class="gu">એગ્રોસેતુ બ્રોકર પેનલ</div>
    <h1>AgroSetu Broker Panel</h1>
    <p>Umiya AgroSetu Digital LLP</p>
  </div>

  <div class="error" id="errorMsg">❌ Invalid mobile number or password.</div>

  <label>Mobile Number / મોબાઈલ નંબર</label>
  <input type="tel" id="mobile" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric"/>

  <label>Password / પાસવર્ડ</label>
  <input type="password" id="password" placeholder="Enter your password"/>

  <button class="btn" id="loginBtn" onclick="doLogin()">Login → પ્રવેશ કરો</button>

  <p class="hint">Registered brokers only. Contact admin for access.</p>
  <hr class="divider"/>
  <div class="admin-link">Admin? <a href="/admin/login">Admin Panel →</a></div>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if(e.key==='Enter') doLogin();
  });

  async function doLogin(){
    const mobile   = document.getElementById('mobile').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    const err      = document.getElementById('errorMsg');

    err.classList.remove('show');
    if(!mobile || !password){ err.textContent='Please enter mobile and password.'; err.classList.add('show'); return; }

    btn.disabled   = true;
    btn.textContent = 'Logging in...';

    try{
      const res = await fetch('/api/broker/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mobile, password})
      });
      if(res.ok){
        window.location.href = '/broker/dashboard';
      } else {
        const data = await res.json();
        err.textContent = '❌ ' + (data.error || 'Invalid credentials');
        err.classList.add('show');
      }
    } catch(e){
      err.textContent = '❌ Server error. Please try again.';
      err.classList.add('show');
    }
    btn.disabled   = false;
    btn.textContent = 'Login → પ્રવેશ કરો';
  }
</script>
</body>
</html>
