<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Umiya AgroSetu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 44px 40px;
      box-shadow: 0 8px 32px rgba(45,90,39,0.12);
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo img {
      height: 64px;
    }
    .login-logo h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e3d1a;
      margin-top: 10px;
      margin-bottom: 2px;
    }
    .login-logo p {
      font-size: 0.78rem;
      color: #888;
    }
    .form-label { font-weight: 600; font-size: 0.85rem; color: #444; }
    .btn-login {
      background: #2d5a27;
      color: white;
      font-weight: 700;
      border: none;
      padding: 11px;
      border-radius: 8px;
      width: 100%;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #1e3d1a; color: white; }
    .error-msg {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    .lock-icon { font-size: 2rem; margin-bottom: 6px; }
  </style>
</head>
<body>
<div class="login-card">

  <div class="login-logo">
    <div class="lock-icon">🔒</div>
    <h2>Admin Panel</h2>
    <p>Umiya AgroSetu — Price Entry</p>
  </div>

  <div class="error-msg" id="errorMsg">
    ❌ Incorrect password. Please try again.
  </div>

  <div class="mb-3">
    <label class="form-label">Admin Password</label>
    <input
      type="password"
      id="passwordInput"
      class="form-control"
      placeholder="Enter admin password"
      autofocus
    />
  </div>

  <button class="btn-login" onclick="doLogin()">Login →</button>

</div>

<script>
  // Allow Enter key to submit
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const password = document.getElementById('passwordInput').value.trim();
    if (!password) return;

    try {
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (res.ok) {
        window.location.href = '/admin'; // ✅ success → go to admin panel
      } else {
        document.getElementById('errorMsg').classList.add('show');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    } catch(err) {
      document.getElementById('errorMsg').classList.add('show');
    }
  }
</script>
</body>
</html>
