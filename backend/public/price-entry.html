<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Price Entry Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .broadcast-btn {
    background: #25d366;
    border: none;
    color: white;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .broadcast-btn:hover { background: #1fba58; color: white; }
  .broadcast-btn:disabled { background: #a8d5b8; cursor: not-allowed; }

  #broadcastModal .modal-header {
    background: #25d366;
    color: white;
    border-radius: 8px 8px 0 0;
  }
  #broadcastModal .modal-header .btn-close { filter: invert(1); }
  #messagePreview {
    background: #f0fff4;
    border: 1px solid #c3e6cb;
    border-radius: 8px;
    padding: 16px;
    font-family: monospace;
    font-size: 0.88rem;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    line-height: 1.6;
  }
  .status-banner {
    display: none;
    padding: 10px 16px;
    border-radius: 6px;
    margin-top: 10px;
    font-weight: 500;
  }
  .status-banner.success { background: #d4edda; color: #155724; display: block; }
  .status-banner.error   { background: #f8d7da; color: #721c24; display: block; }
  .status-banner.loading { background: #d1ecf1; color: #0c5460; display: block; }
  .btn-group-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }
</style>
</head>

<body>
<div class="container">
<div class="container-box">

  <h2 class="mb-4">Daily Price Entry</h2>
<a href="/admin/logout" class="btn btn-outline-secondary btn-sm float-end">
  🔒 Logout
</a>
  <table class="table table-bordered" id="priceTable">
    <thead class="table-light">
      <tr>
        <th>Factory</th>
        <th>Commodity</th>
        <th>Price</th>
        <th>Remarks</th>
        <th>Price Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><select class="form-select factory"></select></td>
        <td><select class="form-select commodity"></select></td>
        <td><input type="number" class="form-control price" placeholder="Enter price"></td>
        <td><input type="text" class="form-control remarks" placeholder="Remarks (Gujarati supported)"></td>
        <td><input type="date" class="form-control price_date"></td>
        <td><button class="btn btn-danger btn-sm delete-row">Delete</button></td>
      </tr>
    </tbody>
  </table>

  <div class="mt-3">
    <div class="btn-group-actions">
      <button class="btn btn-secondary" onclick="addRow()">+ Add Row</button>
      <button class="btn btn-primary" onclick="savePrices()">💾 Save Prices</button>
      <button class="broadcast-btn" onclick="previewBroadcast()" id="broadcastBtn">
        💬 Send WhatsApp Broadcast
      </button>
    </div>

    <div id="statusBanner" class="status-banner"></div>
  </div>

  <hr class="mt-5">
  <h4>All Price Records</h4>
  <table class="table table-bordered" id="recordsTable">
    <thead class="table-light">
      <tr>
        <th>ID</th><th>Factory</th><th>Commodity</th><th>Price</th><th>Date</th><th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>
</div>

<!-- ── BROADCAST PREVIEW MODAL ──────────────────── -->
<div class="modal fade" id="broadcastModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">💬 WhatsApp Broadcast Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p class="text-muted mb-2" style="font-size:0.85rem">
          Review the message below before sending to all active subscribers:
        </p>
        <div id="messagePreview">Loading preview...</div>
        <div id="modalStatus" class="status-banner mt-3"></div>
      </div>

      <div class="modal-footer">
        <div id="subscriberCount" class="text-muted me-auto" style="font-size:0.83rem"></div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="broadcast-btn" id="confirmSendBtn" onclick="confirmBroadcast()">
          ✅ Confirm & Send
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/price-entry.js"></script>
<script>
  const API_BASE = '';  // same server, no prefix needed
  let broadcastModal;

  document.addEventListener('DOMContentLoaded', () => {
    broadcastModal = new bootstrap.Modal(document.getElementById('broadcastModal'));
  });

  // ── STEP 1: Preview message before sending ──────
  async function previewBroadcast() {
    const btn = document.getElementById('broadcastBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Loading preview...';

    try {
      const res = await fetch(`${API_BASE}/api/broadcast/today-message`);
      if (!res.ok) throw new Error('Failed to load message');
      const data = await res.json();

      document.getElementById('messagePreview').textContent = data.message;
      document.getElementById('modalStatus').className = 'status-banner';
      document.getElementById('modalStatus').textContent = '';
      document.getElementById('confirmSendBtn').disabled = false;
      document.getElementById('subscriberCount').textContent =
        '📱 Will be sent to all active subscribers';

      broadcastModal.show();

    } catch (err) {
      showStatus('statusBanner', 'error', '❌ Could not load message preview. Is server running?');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '💬 Send WhatsApp Broadcast';
    }
  }

  // ── STEP 2: Confirm and send ────────────────────
  async function confirmBroadcast() {
    const btn = document.getElementById('confirmSendBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Sending...';
    showModalStatus('loading', '📣 Sending broadcast to all subscribers...');

    try {
      const res = await fetch(`${API_BASE}/api/broadcast/send-broadcast`);
      if (!res.ok) throw new Error('Broadcast failed');

      showModalStatus('success', '✅ Broadcast sent successfully! Check WhatsApp.');

      // Close modal after 2 seconds
      setTimeout(() => {
        broadcastModal.hide();
        showStatus('statusBanner', 'success', '✅ WhatsApp broadcast sent to all subscribers!');
      }, 2000);

    } catch (err) {
      showModalStatus('error', '❌ Broadcast failed. Check terminal for errors.');
      btn.disabled = false;
      btn.innerHTML = '✅ Confirm & Send';
    }
  }

  function showModalStatus(type, msg) {
    const el = document.getElementById('modalStatus');
    el.className = `status-banner ${type}`;
    el.textContent = msg;
  }

  function showStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `status-banner ${type}`;
    el.textContent = msg;
    setTimeout(() => { el.className = 'status-banner'; }, 5000);
  }
</script>

</body>
</html>
