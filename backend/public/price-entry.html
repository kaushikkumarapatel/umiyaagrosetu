<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Daily Price Entry Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<div class="container">

<div class="container-box">

<h2 class="mb-4">Daily Price Entry</h2>

<table class="table table-bordered" id="priceTable">

<thead class="table-light">

<tr>
<th>Factory</th>
<th>Commodity</th>
<th>Price</th>
<th>Remarks</th>
<th>Price Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr>

<td>
<select class="form-select factory"></select>
</td>

<td>
<select class="form-select commodity"></select>
</td>

<td>
<input type="number" class="form-control price" placeholder="Enter price">
</td>

<td>
<input type="text" class="form-control remarks" placeholder="Remarks (Gujarati supported)">
</td>

<td>
<input type="date" class="form-control price_date">
</td>

<td>
<button class="btn btn-danger btn-sm delete-row">Delete</button>
</td>

</tr>

</tbody>

</table>

<div class="mt-3">

<button class="btn btn-secondary" onclick="addRow()">+ Add Row</button>

<button class="btn btn-primary" onclick="savePrices()">Save Prices</button>
<br>
<hr class="mt-5">

<h4>All Price Records</h4>

<table class="table table-bordered" id="recordsTable">

<thead class="table-light">
<tr>
<th>ID</th>
<th>Factory</th>
<th>Commodity</th>
<th>Price</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script src="/js/price-entry.js"></script>

</body>

</html>
